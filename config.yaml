# GitHub Reputation Bot Configuration
# Copy this file to config.yaml and edit with your values

github:
  token: "${GITHUB_TOKEN}"
  webhook_secret: "${GITHUB_WEBHOOK_SECRET}"

bot:
  name: "Reputation Bot"
  footer: "Generated by [{BOT_NAME}](https://github.com/archestra-ai/reputation-bot)"

repository:
  name: "archestra-ai/archestra"

reputation:
  threshold: -80
  points:
    merged_pr: 20
    open_pr: 3
    closed_pr: -10
    issue: 5
    core_thumbs_up: 15
    core_thumbs_down: -50

core_team:
  members: []
  # Example: ["user1", "user2", "user3"]

server:
  host: "0.0.0.0"
  port: 8080
